version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${MC_HOST_PORT:-10000}:${MC_CONTAINER_PORT:-10000}"
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/data/prod.db}
      - NODE_ENV=production
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${MC_CONTAINER_PORT:-10000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
